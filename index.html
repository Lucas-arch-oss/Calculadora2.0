<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="display">
      <span id="result">0</span>
    </div>

    <div class="buttons">
      <button class="btn orange" id="ac">AC</button>
      <button class="btn orange" id="plus-minus">+/-</button>
      <button class="btn orange" id="percent">%</button>
      <button class="btn orange" id="divide">÷</button>

      <button class="btn" id="7">7</button>
      <button class="btn" id="8">8</button>
      <button class="btn" id="9">9</button>
      <button class="btn orange" id="multiply">×</button>

      <button class="btn" id="4">4</button>
      <button class="btn" id="5">5</button>
      <button class="btn" id="6">6</button>
      <button class="btn orange" id="subtract">−</button>

      <button class="btn" id="1">1</button>
      <button class="btn" id="2">2</button>
      <button class="btn" id="3">3</button>
      <button class="btn orange" id="add">+</button>

      <button class="btn wide" id="0">0</button>
      <button class="btn" id="comma">,</button>
      <button class="btn orange equal" id="equals">=</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
